    #loading-screen {
      position: fixed; inset: 0; z-index: 100;

      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #665544; font-family: 'Georgia', serif;

    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    #loading-screen h1 { font-size: 2.5rem; letter-spacing: 0.3em; margin-bottom: 1rem; }
    #loading-bar-container {

      width: 0%; height: 100%; background: #665544;
      transition: width 0.3s ease;
    }
    #loading-text { margin-top: 1rem; font-size: 0.8rem; opacity: 0.6; }

    #ui-overlay {
      position: fixed; inset: 0; z-index: 10;
      pointer-events: none;
      font-family: 'Georgia', serif;
      color: #aa9977;
    }

    #crosshair {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 2px; height: 2px;
      background: rgba(170, 153, 119, 0.5);
      border-radius: 50%;
      box-shadow: 0 0 4px rgba(170, 153, 119, 0.3);
    }

    #interaction-prompt {
      position: absolute; bottom: 20%; left: 50%;
      transform: translateX(-50%);
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.3s ease;
      text-shadow: 0 0 10px rgba(0,0,0,0.8);
      text-align: center;
    }
    #interaction-prompt.visible { opacity: 1; }

    #book-controls {
      position: absolute; bottom: 10%; left: 50%;
      transform: translateX(-50%);
      font-size: 0.8rem;
      opacity: 0;
      transition: opacity 0.3s ease;
      text-align: center;
      line-height: 1.8;
    }
    #book-controls.visible { opacity: 1; }
    #book-controls kbd {
      background: rgba(170, 153, 119, 0.15);
      border: 1px solid rgba(170, 153, 119, 0.3);
      padding: 2px 8px;
      border-radius: 3px;
      font-family: inherit;
    }

    #click-to-start {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(10, 10, 15, 0.9);
      display: flex; align-items: center; justify-content: center;
